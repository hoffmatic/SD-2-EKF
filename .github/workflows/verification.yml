name: Verification

on:
  push:
  pull_request:

jobs:
  native-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build native targets
        run: cmake --build build --config Release --parallel

      - name: Run native and STM32-C host tests
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Run Python USB and replay host tests
        run: |
          python3 -m unittest discover -s firmware/stm32_airbrake_pcb/HostTests -p "test_*.py"
          python3 firmware/stm32_airbrake_pcb/HostTests/bench_replay_tests.py

  rocketpy-reference:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-simulation.txt

      - name: Install RocketPy
        run: python -m pip install -r requirements-simulation.txt

      - name: Build controller bridge
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target ambar_stm32_controller_bridge --parallel

      - name: Run Monte Carlo orchestration tests
        run: python -m unittest sim/rocketpy/test_monte_carlo.py

      - name: Run RocketPy reference checks
        id: rocketpy
        continue-on-error: true
        run: python sim/rocketpy/run_rocketpy_sim.py --bridge build/ambar_stm32_controller_bridge

      - name: Explain provisional reference failures
        if: steps.rocketpy.outcome == 'failure'
        run: |
          echo "RocketPy completed with one or more failed engineering criteria."
          echo "Review the uploaded result artifact; known model gaps are not hidden or force-fitted."

      - name: Validate structured RocketPy flight data
        if: always()
        run: python scripts/validate_rocketpy_output.py build/rocketpy-last-run.json

      - name: Upload RocketPy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rocketpy-reference-results
          path: build/rocketpy-last-run.json
          if-no-files-found: warn
